name: Python CI

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Linter
        run: |
          ruff check .

      - name: List repository
        run: ls -R
      - name: Trying Testing   
        run: pytest test.py -v
      
      - name: Run Tests
        run: |
          pytest
